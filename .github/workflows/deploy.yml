name: Build & Deploy Docker Luxing Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: |
          docker build \
            --build-arg CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            --build-arg CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            --build-arg CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            --build-arg NEXT_PUBLIC_REPLICATE_API_TOKEN="${{ secrets.NEXT_PUBLIC_REPLICATE_API_TOKEN }}" \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -t ${{ secrets.DOCKER_USER }}/luxign:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/luxign:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/apps/luxign
            docker pull ${{ secrets.DOCKER_USER }}/luxign:latest

            docker compose up -d --force-recreate
